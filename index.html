<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Barra Al Salfa By Saturoi</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div id="join-screen">
            <h2>من أنت</h2>
            <div class="box">
                <input type="text" id="username-input" placeholder="اسم مال انت سديك" maxlength="15">
                <button id="join-btn">أقلط</button>
            </div>
        </div>

        <div id="game-screen" style="display: none;">
            <h2>برا السالفة ، بس أونلاين</h2>

            <div class="box">
                <strong>السالفة:</strong>
                <div id="word-box" class="highlight"></div>
            </div>

            <div class="box">
                <strong>دورك في اللعبة:</strong>
                <div id="player-status" class="status">أصبر اللعبة تبدأ أول</div>
            </div>

            <div class="box">
                <strong>مجلس ما به نفس ثقيلة:</strong>
                <ul id="player-list" class="player-list"></ul>
            </div>

            <button id="restart-btn" style="display: none;">دوس هنا يا مدير القروب</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
